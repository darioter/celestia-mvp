<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestia · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #0D1B2A;
    --navy-light: #1A2E42;
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --cream: #FAF6EF;
    --cream-dark: #EDE8DF;
    --white: #FFFFFF;
    --text-dark: #1A1A2E;
    --text-mid: #4A4A6A;
    --text-light: #8A8AAA;
    --green: #2D7A4F;
    --green-light: #E8F5EE;
    --red: #9B2335;
    --red-light: #FAE8EA;
    --amber: #8B5E00;
    --amber-light: #FFF3E0;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    color: var(--cream);
  }

  /* LOGIN */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--gold-light);
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(250,246,239,0.4);
    margin-bottom: 36px;
  }
  .login-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--cream);
    outline: none;
    margin-bottom: 14px;
    letter-spacing: 0.1em;
    text-align: center;
  }
  .login-input:focus { border-color: var(--gold); }
  .login-btn {
    width: 100%;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 40px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .login-btn:hover { background: var(--gold-light); }
  .login-error {
    font-size: 12px;
    color: #E87070;
    margin-top: 12px;
    display: none;
  }

  /* ADMIN */
  #admin-screen { display: none; }

  .admin-header {
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .admin-header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .admin-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--gold-light);
  }
  .admin-badge {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(250,246,239,0.4);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 3px 8px;
    border-radius: 20px;
  }
  .admin-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--gold-light);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: rgba(250,246,239,0.4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .logout-btn {
    background: transparent;
    border: 1px solid rgba(250,246,239,0.15);
    color: rgba(250,246,239,0.5);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: rgba(250,246,239,0.4); color: var(--cream); }

  .admin-body { padding: 32px; }

  /* FILTROS */
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(201,168,76,0.15);
    color: rgba(250,246,239,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .filter-btn.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold-light);
  }
  .refresh-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 7px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .refresh-btn:hover { background: rgba(201,168,76,0.1); }

  /* TABLA */
  .reservas-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .reserva-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 140px 1fr 1fr 160px 180px;
    gap: 20px;
    align-items: center;
    transition: all 0.2s;
  }
  .reserva-card:hover { background: rgba(255,255,255,0.06); }
  .reserva-card.estado-reservada { border-left: 3px solid var(--gold); }
  .reserva-card.estado-confirmada { border-left: 3px solid #4CAF50; }
  .reserva-card.estado-cancelada { border-left: 3px solid rgba(255,255,255,0.2); opacity: 0.5; }

  .res-fecha {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--cream);
  }
  .res-turno {
    font-size: 11px;
    color: rgba(250,246,239,0.5);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .res-ref {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  .res-cliente { }
  .res-nombre {
    font-size: 15px;
    font-weight: 500;
    color: var(--cream);
    margin-bottom: 3px;
  }
  .res-contacto {
    font-size: 12px;
    color: rgba(250,246,239,0.5);
    font-weight: 300;
  }

  .res-detalle { }
  .res-menu {
    font-size: 13px;
    color: rgba(250,246,239,0.8);
    margin-bottom: 3px;
  }
  .res-personas {
    font-size: 12px;
    color: rgba(250,246,239,0.45);
  }
  .res-monto {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--gold-light);
    text-align: right;
  }
  .res-senia {
    font-size: 11px;
    color: rgba(250,246,239,0.4);
    text-align: right;
    margin-top: 2px;
  }

  /* ESTADO BADGE */
  .estado-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
  }
  .estado-badge.reservada { background: rgba(201,168,76,0.15); color: var(--gold-light); }
  .estado-badge.confirmada { background: rgba(76,175,80,0.15); color: #81C784; }
  .estado-badge.cancelada { background: rgba(255,255,255,0.06); color: rgba(250,246,239,0.4); }

  /* ACCIONES */
  .res-acciones {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .accion-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid;
    letter-spacing: 0.04em;
    text-align: center;
  }
  .btn-confirmar {
    background: rgba(76,175,80,0.1);
    border-color: rgba(76,175,80,0.3);
    color: #81C784;
  }
  .btn-confirmar:hover { background: rgba(76,175,80,0.2); }
  .btn-cancelar {
    background: rgba(155,35,53,0.1);
    border-color: rgba(155,35,53,0.3);
    color: #E57373;
  }
  .btn-cancelar:hover { background: rgba(155,35,53,0.2); }
  .btn-whatsapp {
    background: rgba(37,211,102,0.1);
    border-color: rgba(37,211,102,0.3);
    color: #25D166;
  }
  .btn-whatsapp:hover { background: rgba(37,211,102,0.2); }

  /* AGENDA CALENDARIO */
  .agenda-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
  }
  /* MES GRANDE - izquierda */
  .agenda-main {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 24px;
  }
  .agenda-main-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .agenda-main-mes {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--cream);
  }
  .agenda-main-anio {
    font-size: 12px;
    color: rgba(250,246,239,0.4);
    letter-spacing: 0.1em;
    margin-top: 2px;
  }
  .agenda-nav { display: flex; gap: 8px; }
  .agenda-nav-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--cream);
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .agenda-nav-btn:hover { background: rgba(255,255,255,0.12); }
  .agenda-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }
  .agenda-dia-nombre {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: rgba(250,246,239,0.3);
    padding-bottom: 6px;
    text-transform: uppercase;
  }
  .agenda-dia {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    color: rgba(250,246,239,0.4);
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    position: relative;
    gap: 2px;
    padding: 3px 2px;
  }
  .agenda-dia.vacio { background: transparent; border-color: transparent; }
  .agenda-dia.hoy { border-color: rgba(201,168,76,0.5); color: var(--gold-light); }
  .agenda-dia.reservada { background: rgba(201,168,76,0.14); border-color: rgba(201,168,76,0.35); color: var(--gold-light); font-weight: 600; }
  .agenda-dia.confirmada { background: rgba(76,175,80,0.14); border-color: rgba(76,175,80,0.35); color: #81C784; font-weight: 600; }
  .agenda-dia.bloqueada { background: rgba(155,35,53,0.1); border-color: rgba(155,35,53,0.25); color: rgba(229,115,115,0.7); }
  .agenda-dia.mixta { background: linear-gradient(135deg, rgba(201,168,76,0.14) 50%, rgba(76,175,80,0.14) 50%); border-color: rgba(201,168,76,0.35); color: var(--cream); font-weight: 600; }
  .agenda-dots { display: flex; gap: 2px; justify-content: center; }
  .agenda-dot { width: 4px; height: 4px; border-radius: 50%; }
  .dot-reservada { background: var(--gold); }
  .dot-confirmada { background: #4CAF50; }
  .dot-bloqueada { background: #E57373; }
  .agenda-legend {
    display: flex; gap: 16px; margin-top: 18px; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(250,246,239,0.45); }
  .legend-dot { width: 9px; height: 9px; border-radius: 2px; }

  /* MINI MESES - derecha */
  .agenda-sidebar {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
    padding-right: 4px;
  }
  .agenda-sidebar::-webkit-scrollbar { width: 4px; }
  .agenda-sidebar::-webkit-scrollbar-track { background: transparent; }
  .agenda-sidebar::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 2px; }
  .mini-mes {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mini-mes:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); }
  .mini-mes.activo {
    border-color: rgba(201,168,76,0.4);
    background: rgba(201,168,76,0.06);
  }
  .mini-mes-header {
    font-size: 12px;
    font-weight: 500;
    color: rgba(250,246,239,0.6);
    margin-bottom: 10px;
    letter-spacing: 0.04em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .mini-mes.activo .mini-mes-header { color: var(--gold-light); }
  .mini-mes-badge {
    font-size: 10px;
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    padding: 2px 7px;
    border-radius: 10px;
  }
  .mini-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .mini-dia-nombre {
    text-align: center;
    font-size: 8px;
    color: rgba(250,246,239,0.25);
    padding-bottom: 4px;
    text-transform: uppercase;
  }
  .mini-dia {
    aspect-ratio: 1;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: rgba(250,246,239,0.3);
  }
  .mini-dia.vacio { background: transparent; }
  .mini-dia.hoy { color: var(--gold-light); font-weight: 700; }
  .mini-dia.reservada { background: rgba(201,168,76,0.25); color: var(--gold-light); font-weight: 600; }
  .mini-dia.confirmada { background: rgba(76,175,80,0.25); color: #81C784; font-weight: 600; }
  .mini-dia.bloqueada { background: rgba(155,35,53,0.2); color: rgba(229,115,115,0.8); }
  .mini-dia.mixta { background: linear-gradient(135deg, rgba(201,168,76,0.25) 50%, rgba(76,175,80,0.25) 50%); font-weight: 600; }

  /* DETALLE */
  .agenda-detalle {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .agenda-detalle-item {
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-left: 3px solid transparent;
  }
  .agenda-detalle-item.reservada { border-left-color: var(--gold); }
  .agenda-detalle-item.confirmada { border-left-color: #4CAF50; }
  .agenda-detalle-item.bloqueada { border-left-color: #E57373; }
  .agenda-detalle-fecha { font-size: 12px; font-weight: 500; color: var(--cream); min-width: 130px; }
  .agenda-detalle-info { font-size: 11px; color: rgba(250,246,239,0.5); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: rgba(250,246,239,0.3);
    font-size: 14px;
  }
  .bloqueo-card {
  background: rgba(155,35,53,0.08);
  border: 1px solid rgba(155,35,53,0.2);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.bloqueo-fecha { font-size: 14px; color: var(--cream); font-weight: 500; }
.bloqueo-motivo { font-size: 12px; color: rgba(250,246,239,0.45); margin-top: 2px; }
.bloqueo-eliminar {
  background: rgba(155,35,53,0.2);
  border: 1px solid rgba(155,35,53,0.3);
  color: #E57373;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 8px;
  cursor: pointer;
  flex-shrink: 0;
}
.bloqueo-eliminar:hover { background: rgba(155,35,53,0.35); }
.bloqueo-form {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.bloqueo-input {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--cream);
  outline: none;
}
.bloqueo-input:focus { border-color: var(--gold); }
.bloqueo-agregar {
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--gold-light);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
}
.bloqueo-agregar:hover { background: rgba(201,168,76,0.25); }
.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  color: var(--gold-light);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(201,168,76,0.15);
}
.empty-state-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: rgba(250,246,239,0.4);
    font-size: 13px;
  }

  @media (max-width: 900px) {
    .reserva-card {
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .res-monto { text-align: left; }
    .res-senia { text-align: left; }
    .admin-stats { display: none; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Celestia · Chef Privado</div>
    <div class="login-sub">Panel de administración</div>
    <input type="password" class="login-input" id="pwd-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Ingresar</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="admin-header">
    <div class="admin-header-left">
      <div class="admin-logo">Celestia</div>
      <div class="admin-badge">Admin</div>
    </div>
    <div class="admin-stats">
      <div class="stat">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-reservadas">—</div>
        <div class="stat-label">Reservadas</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-confirmadas">—</div>
        <div class="stat-label">Confirmadas</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Salir</button>
  </div>

  <div class="admin-body">
    <div style="display:flex;gap:12px;margin-bottom:28px;">
      <button class="filter-btn active" onclick="verSeccion('reservas',this)">Reservas</button>
      <button class="filter-btn" onclick="verSeccion('agenda',this)">Agenda</button>
      <button class="filter-btn" onclick="verSeccion('bloqueos',this)">Bloquear días</button>
    </div>

    <!-- SECCIÓN AGENDA -->
    <div id="seccion-agenda" style="display:none;">
      <div class="agenda-layout">
        <!-- MES GRANDE - izquierda -->
        <div class="agenda-main">
          <div class="agenda-main-header">
            <div>
              <div class="agenda-main-mes" id="agenda-mes-label">—</div>
              <div class="agenda-main-anio" id="agenda-anio-label">—</div>
            </div>
            <div class="agenda-nav">
              <button class="agenda-nav-btn" onclick="agendaNav(-1)">‹</button>
              <button class="agenda-nav-btn" onclick="agendaNav(1)">›</button>
            </div>
          </div>
          <div class="agenda-grid" id="agenda-grid"></div>
          <div class="agenda-legend">
            <div class="legend-item"><div class="legend-dot" style="background:rgba(201,168,76,0.4);border:1px solid var(--gold);"></div>Reservada</div>
            <div class="legend-item"><div class="legend-dot" style="background:rgba(76,175,80,0.4);border:1px solid #4CAF50;"></div>Confirmada</div>
            <div class="legend-item"><div class="legend-dot" style="background:rgba(155,35,53,0.3);border:1px solid #E57373;"></div>Bloqueado</div>
            <div class="legend-item"><div class="legend-dot" style="border:1px solid rgba(201,168,76,0.5);"></div>Hoy</div>
          </div>
          <div class="agenda-detalle" id="agenda-detalle"></div>
        </div>
        <!-- MINI MESES - derecha -->
        <div class="agenda-sidebar" id="agenda-sidebar"></div>
      </div>
    </div>

    <!-- SECCIÓN BLOQUEOS -->
    <div id="seccion-bloqueos" style="display:none;">
      <div class="section-title">✦ Días bloqueados — sin disponibilidad</div>
      <div class="bloqueo-form">
        <input type="date" class="bloqueo-input" id="bloqueo-fecha" placeholder="Fecha">
        <input type="text" class="bloqueo-input" id="bloqueo-motivo" placeholder="Motivo (opcional)" style="min-width:200px;">
        <button class="bloqueo-agregar" onclick="agregarBloqueo()">+ Bloquear fecha</button>
      </div>
      <div id="bloqueos-grid" style="display:flex;flex-direction:column;gap:8px;">
        <div class="loading">Cargando bloqueos...</div>
      </div>
    </div>

    <!-- SECCIÓN RESERVAS -->
    <div id="seccion-reservas">
    <div class="filters">
      <button class="filter-btn active" onclick="setFiltro('todas', this)">Todas</button>
      <button class="filter-btn" onclick="setFiltro('reservada', this)">Reservadas</button>
      <button class="filter-btn" onclick="setFiltro('confirmada', this)">Confirmadas</button>
      <button class="filter-btn" onclick="setFiltro('cancelada', this)">Canceladas</button>
      <button class="refresh-btn" onclick="cargarReservas()">↻ Actualizar</button>
    </div>
    <div class="reservas-grid" id="reservas-grid">
      <div class="loading">Cargando reservas...</div>
    </div>
  </div>
</div>
</div>

<script>
const SUPA_URL = 'https://qolpnuscpmzqeacshfvu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvbHBudXNjcG16cWVhY3NoZnZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NjQ3OTQsImV4cCI6MjA5MTM0MDc5NH0.BJOz5Gwkeb1NqID_gkGKD5YlymifMtOwaf8iQMaBCx8';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

const PWD = 'piko6969';
let todasReservas = [];
let filtroActual = 'todas';

// ─── AGENDA ─────────────────────────────────────────────
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_SEMANA = ['Do','Lu','Ma','Mi','Ju','Vi','Sá'];
let agendaYear = new Date().getFullYear();
let agendaMonth = new Date().getMonth();
let bloqueosDias = [];
let agendaReservas = [];

function agendaNav(dir) {
  agendaMonth += dir;
  if (agendaMonth > 11) { agendaMonth = 0; agendaYear++; }
  if (agendaMonth < 0) { agendaMonth = 11; agendaYear--; }
  renderAgendaMain();
  renderMiniMeses();
}

async function cargarDatosAgenda() {
  const [resR, resB] = await Promise.all([
    supa.from('reservas').select('fecha, turno, estado, nombre, personas, menu').in('estado', ['reservada', 'confirmada']),
    supa.from('bloqueos').select('fecha, motivo')
  ]);
  bloqueosDias = resB.data || [];
  agendaReservas = resR.data || [];
}

function buildPorFecha() {
  const porFecha = {};
  agendaReservas.forEach(r => {
    if (!porFecha[r.fecha]) porFecha[r.fecha] = [];
    porFecha[r.fecha].push(r);
  });
  return porFecha;
}

function claseDia(dateStr, porFecha, bloqueosSet) {
  if (bloqueosSet.has(dateStr)) return 'bloqueada';
  const res = porFecha[dateStr];
  if (!res || res.length === 0) return '';
  const estados = res.map(r => r.estado);
  if (estados.includes('confirmada') && estados.includes('reservada')) return 'mixta';
  if (estados.includes('confirmada')) return 'confirmada';
  return 'reservada';
}

function renderGridMes(year, month, porFecha, bloqueosSet, clasePrefix, dotSize) {
  const hoy = new Date();
  const hoyStr = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-${String(hoy.getDate()).padStart(2,'0')}`;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  let html = DIAS_SEMANA.map(d => `<div class="${clasePrefix}-dia-nombre">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += `<div class="${clasePrefix}-dia vacio"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const clase = claseDia(dateStr, porFecha, bloqueosSet);
    const esHoy = dateStr === hoyStr;
    const clases = `${clasePrefix}-dia${clase ? ' ' + clase : ''}${esHoy ? ' hoy' : ''}`;

    let dots = '';
    if (clase && clase !== 'bloqueada') {
      const res = porFecha[dateStr] || [];
      dots = `<div class="agenda-dots">${res.map(r => `<div class="agenda-dot dot-${r.estado}" style="width:${dotSize}px;height:${dotSize}px;"></div>`).join('')}</div>`;
    } else if (clase === 'bloqueada') {
      dots = `<div class="agenda-dots"><div class="agenda-dot dot-bloqueada" style="width:${dotSize}px;height:${dotSize}px;"></div></div>`;
    }

    html += `<div class="${clases}">${d}${dots}</div>`;
  }
  return html;
}

function renderAgendaMain() {
  document.getElementById('agenda-mes-label').textContent = MESES[agendaMonth];
  document.getElementById('agenda-anio-label').textContent = agendaYear;

  const porFecha = buildPorFecha();
  const bloqueosSet = new Set(bloqueosDias.map(b => b.fecha));

  document.getElementById('agenda-grid').innerHTML = renderGridMes(agendaYear, agendaMonth, porFecha, bloqueosSet, 'agenda', 4);

  // Detalle del mes
  const eventosMes = [];
  const hoy = new Date();
  const daysInMonth = new Date(agendaYear, agendaMonth + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${agendaYear}-${String(agendaMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (bloqueosSet.has(dateStr)) {
      eventosMes.push({ fecha: dateStr, tipo: 'bloqueada', label: 'Día bloqueado', info: bloqueosDias.find(b=>b.fecha===dateStr)?.motivo || '' });
    }
    (porFecha[dateStr] || []).forEach(r => {
      eventosMes.push({ fecha: dateStr, tipo: r.estado, label: r.nombre || '—', info: `${r.turno === 'almuerzo' ? '☀' : '🌙'} ${r.turno} · ${r.personas}p · ${r.menu}` });
    });
  }

  const fmtFecha = f => new Date(f + 'T12:00:00').toLocaleDateString('es-AR', { weekday: 'short', day: 'numeric', month: 'short' });

  const detalle = document.getElementById('agenda-detalle');
  detalle.innerHTML = eventosMes.length === 0 ? '' :
    `<div class="section-title" style="margin-top:16px;font-size:13px;">Eventos del mes</div>` +
    eventosMes.map(e => `
      <div class="agenda-detalle-item ${e.tipo}">
        <div class="agenda-detalle-fecha">${fmtFecha(e.fecha)}</div>
        <div>
          <div style="font-size:12px;color:var(--cream);font-weight:500;">${e.label}</div>
          ${e.info ? `<div class="agenda-detalle-info">${e.info}</div>` : ''}
        </div>
      </div>`).join('');
}

function renderMiniMeses() {
  const porFecha = buildPorFecha();
  const bloqueosSet = new Set(bloqueosDias.map(b => b.fecha));
  const sidebar = document.getElementById('agenda-sidebar');
  let html = '';

  // Mostrar 8 meses desde el actual
  for (let offset = 0; offset < 8; offset++) {
    let m = agendaMonth + offset;
    let y = agendaYear;
    if (m > 11) { m -= 12; y++; }

    // Contar eventos del mes
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    let eventos = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if (bloqueosSet.has(dateStr) || (porFecha[dateStr] && porFecha[dateStr].length > 0)) eventos++;
    }

    const esActivo = (m === agendaMonth && y === agendaYear);
    const badge = eventos > 0 ? `<span class="mini-mes-badge">${eventos}</span>` : '';

    html += `
      <div class="mini-mes${esActivo ? ' activo' : ''}" onclick="irAMes(${y},${m})">
        <div class="mini-mes-header">${MESES[m]} ${y !== agendaYear ? y : ''}${badge}</div>
        <div class="mini-grid">
          ${renderGridMes(y, m, porFecha, bloqueosSet, 'mini', 3)}
        </div>
      </div>`;
  }
  sidebar.innerHTML = html;
}

function irAMes(year, month) {
  agendaYear = year;
  agendaMonth = month;
  renderAgendaMain();
  renderMiniMeses();
}

async function renderAgenda() {
  document.getElementById('agenda-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:rgba(250,246,239,0.3);font-size:13px;">Cargando...</div>';
  document.getElementById('agenda-sidebar').innerHTML = '<div style="color:rgba(250,246,239,0.3);font-size:13px;padding:20px;">Cargando...</div>';
  await cargarDatosAgenda();
  renderAgendaMain();
  renderMiniMeses();
}

function verSeccion(seccion, btn) {
  document.getElementById('seccion-reservas').style.display = seccion === 'reservas' ? 'block' : 'none';
  document.getElementById('seccion-agenda').style.display = seccion === 'agenda' ? 'block' : 'none';
  document.getElementById('seccion-bloqueos').style.display = seccion === 'bloqueos' ? 'block' : 'none';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (seccion === 'bloqueos') cargarBloqueos();
  if (seccion === 'agenda') renderAgenda();
}

async function cargarBloqueos() {
  document.getElementById('bloqueos-grid').innerHTML = '<div class="loading">Cargando...</div>';
  const { data, error } = await supa.from('bloqueos').select('*').order('fecha', { ascending: true });
  if (error) { document.getElementById('bloqueos-grid').innerHTML = '<div class="loading">Error</div>'; return; }

  if (data.length === 0) {
    document.getElementById('bloqueos-grid').innerHTML = '<div class="empty-state"><div class="empty-state-icon">✦</div>No hay días bloqueados</div>';
    return;
  }

  const fmtFecha = f => {
    const d = new Date(f + 'T12:00:00');
    return d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  };

  document.getElementById('bloqueos-grid').innerHTML = data.map(b => `
    <div class="bloqueo-card">
      <div>
        <div class="bloqueo-fecha">${fmtFecha(b.fecha)}</div>
        ${b.motivo ? `<div class="bloqueo-motivo">${b.motivo}</div>` : ''}
      </div>
      <button class="bloqueo-eliminar" onclick="eliminarBloqueo('${b.id}')">✕ Liberar</button>
    </div>
  `).join('');
}

async function agregarBloqueo() {
  const fecha = document.getElementById('bloqueo-fecha').value;
  const motivo = document.getElementById('bloqueo-motivo').value;
  if (!fecha) { alert('Seleccioná una fecha'); return; }
  const { error } = await supa.from('bloqueos').insert([{ fecha, motivo }]);
  if (error) { alert('Error: ' + (error.message || 'fecha ya bloqueada')); return; }
  document.getElementById('bloqueo-fecha').value = '';
  document.getElementById('bloqueo-motivo').value = '';
  cargarBloqueos();
}

async function eliminarBloqueo(id) {
  const { error } = await supa.from('bloqueos').delete().eq('id', id);
  if (error) { alert('Error: ' + error.message); return; }
  cargarBloqueos();
}

function login() {
  const val = document.getElementById('pwd-input').value;
  if (val === PWD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    cargarReservas();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('pwd-input').value = '';
}

function setFiltro(filtro, btn) {
  filtroActual = filtro;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderReservas();
}

async function cargarReservas() {
  document.getElementById('reservas-grid').innerHTML = '<div class="loading">Cargando...</div>';
  const { data, error } = await supa
    .from('reservas')
    .select('*')
    .order('fecha', { ascending: true });
  if (error) {
    document.getElementById('reservas-grid').innerHTML = '<div class="loading">Error al cargar reservas</div>';
    return;
  }
  todasReservas = data;
  actualizarStats();
  renderReservas();
}

function actualizarStats() {
  document.getElementById('stat-total').textContent = todasReservas.length;
  document.getElementById('stat-reservadas').textContent = todasReservas.filter(r => r.estado === 'reservada').length;
  document.getElementById('stat-confirmadas').textContent = todasReservas.filter(r => r.estado === 'confirmada').length;
}

function renderReservas() {
  const reservas = filtroActual === 'todas'
    ? todasReservas
    : todasReservas.filter(r => r.estado === filtroActual);

  if (reservas.length === 0) {
    document.getElementById('reservas-grid').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">✦</div>
        No hay reservas ${filtroActual !== 'todas' ? 'con estado ' + filtroActual : ''}
      </div>`;
    return;
  }

  const fmt = n => n ? '$' + Number(n).toLocaleString('es-AR') : '—';
  const fmtFecha = f => {
    if (!f) return '—';
    const d = new Date(f + 'T12:00:00');
    return d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
  };

  document.getElementById('reservas-grid').innerHTML = reservas.map(r => `
    <div class="reserva-card estado-${r.estado}" id="card-${r.id}">
      <div>
        <div class="res-fecha">${fmtFecha(r.fecha)}</div>
        <div class="res-turno">${r.turno === 'almuerzo' ? '☀ Almuerzo' : '🌙 Cena'}</div>
        <div class="res-ref">${r.ref}</div>
      </div>
      <div class="res-cliente">
        <div class="res-nombre">${r.nombre || '—'}</div>
        <div class="res-contacto">${r.tel || ''}<br>${r.email || ''}</div>
        ${r.dir ? `<div class="res-contacto" style="margin-top:4px;">📍 ${r.dir}</div>` : ''}
        ${r.notas ? `<div class="res-contacto" style="margin-top:4px;font-style:italic;">${r.notas}</div>` : ''}
      </div>
      <div class="res-detalle">
        <div class="res-menu">${r.menu || '—'}</div>
        <div class="res-personas">${r.personas} personas</div>
        ${r.ocasion ? `<div class="res-contacto" style="margin-top:4px;">${r.ocasion}</div>` : ''}
      </div>
      <div>
        <div class="res-monto">${fmt(r.total)}</div>
        <div class="res-senia">Seña 50%: ${fmt(r.total ? Math.round(r.total * 0.5 / 100) * 100 : 0)}</div>
        <div style="margin-top:8px;">
          <span class="estado-badge ${r.estado}">${r.estado}</span>
        </div>
      </div>
      <div class="res-acciones">
        ${r.estado === 'reservada' ? `<button class="accion-btn btn-confirmar" onclick="cambiarEstado('${r.id}','confirmada')">✓ Confirmar</button>` : ''}
        ${r.estado !== 'cancelada' ? `<button class="accion-btn btn-cancelar" onclick="cambiarEstado('${r.id}','cancelada')">✕ Cancelar</button>` : `<button class="accion-btn btn-cancelar" onclick="eliminarDefinitivo('${r.id}','${r.nombre}')" style="background:rgba(155,35,53,0.25);border-color:rgba(155,35,53,0.5);">🗑 Eliminar</button>`}
        ${r.tel ? `<button class="accion-btn btn-whatsapp" onclick="abrirWA('${r.tel}','${r.nombre}','${r.ref}','${r.estado}')">WA Cliente</button>` : ''}
      </div>
    </div>
  `).join('');
}

async function eliminarDefinitivo(id, nombre) {
  if (!confirm(`¿Eliminar definitivamente la reserva de ${nombre}? Esta acción no se puede deshacer.`)) return;
  const { error } = await supa.from('reservas').delete().eq('id', id);
  if (error) { alert('Error: ' + error.message); return; }
  todasReservas = todasReservas.filter(r => r.id !== id);
  actualizarStats();
  renderReservas();
}

async function cambiarEstado(id, nuevoEstado) {
  const { error } = await supa
    .from('reservas')
    .update({ estado: nuevoEstado })
    .eq('id', id);
  if (error) {
    alert('Error al actualizar: ' + error.message);
    return;
  }
  const r = todasReservas.find(r => r.id === id);
  if (r) r.estado = nuevoEstado;
  actualizarStats();
  renderReservas();
}

function abrirWA(tel, nombre, ref, estado) {
  const msg = estado === 'confirmada'
    ? `Hola ${nombre}! Te confirmamos tu reserva Celestia (${ref}). Quedamos a tu disposición para cualquier consulta.`
    : `Hola ${nombre}! Te escribimos de Celestia respecto a tu solicitud de reserva (${ref}).`;
  const num = tel.replace(/\D/g, '');
  window.open(`https://wa.me/${num.startsWith('54') ? num : '54' + num}?text=${encodeURIComponent(msg)}`, '_blank');
}
</script>
